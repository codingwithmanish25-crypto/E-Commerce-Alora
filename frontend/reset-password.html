<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Alora Radiance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md mx-4">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Reset Password</h2>
    
    <form id="resetForm" class="space-y-4">
      <div>
        <label class="block text-gray-600 text-sm font-medium">New Password</label>
        <input type="password" id="password" required class="w-full mt-1 p-2.5 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
      </div>
      <button type="submit" class="w-full bg-[#2A2A24] text-white p-2.5 rounded-xl font-semibold hover:bg-orange-600 transition shadow-sm">Update Password</button>
    </form>
  </div>

  <!-- FIX: app.js ko hata kar auth.js lagaya -->
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
