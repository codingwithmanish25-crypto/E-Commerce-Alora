<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Alora Radiance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    #bgFrame {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      transform: scale(1.02);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body class="relative min-h-screen flex items-center justify-center overflow-hidden">

  <!-- Background: live index.html blurred -->
  <iframe id="bgFrame" src="./index.html" tabindex="-1" aria-hidden="true"></iframe>
  <div class="absolute inset-0 bg-black/30 z-[1] pointer-events-none"></div>

  <!-- Register Box -->
  <div class="bg-white/95 p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4 relative z-10 border border-white/40">

    <a href="./index.html" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl no-underline">&times;</a>

    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800 tracking-tight">Register</h2>

    <form id="registerForm" class="space-y-4">
      <div>
        <label class="block text-gray-600 text-sm font-medium">Full Name</label>
        <input type="text" id="name" required class="w-full mt-1 p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
      </div>
      <div>
        <label class="block text-gray-600 text-sm font-medium">Email</label>
        <input type="email" id="email" required class="w-full mt-1 p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
      </div>
      <div>
        <label class="block text-gray-600 text-sm font-medium">Password</label>
        <input type="password" id="password" required class="w-full mt-1 p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
      </div>
      <div>
        <label for="phone" class="block text-sm font-medium text-gray-600">Phone Number</label>
        <input 
            type="tel" 
            id="phone" 
            required 
            pattern="[0-9]{10}" 
            maxlength="10"
            title="Kripya strictly 10-digit ka mobile number enter karein"
            placeholder="Enter 10-digit phone number" 
            class="w-full mt-1 p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none transition"
            oninput="this.value = this.value.replace(/[^0-9]/g, '');" 
        />
      </div>
      <button type="submit" class="w-full bg-[#2A2A24] text-white py-2.5 rounded-xl font-semibold hover:bg-orange-600 transition shadow-sm">Register</button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-600">
      Already have an account? <a href="login.html" class="text-blue-500 font-semibold hover:underline">Login</a>
    </p>
  </div>

  <!-- Custom Module Script Connection (Handling auth operations exclusively) -->
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
