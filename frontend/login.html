<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Alora Radiance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative min-h-screen flex items-center justify-center overflow-hidden">

  <!-- Background: live index.html -->
  <iframe id="bgFrame" src="./index.html" class="fixed top-0 left-0 w-full h-full border-none scale-[1.02] pointer-events-none z-0" tabindex="-1" aria-hidden="true"></iframe>
  <div class="absolute inset-0 bg-black/30 z-[1] pointer-events-none"></div>

  <!-- Main Container for Forms -->
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4 relative z-10 border border-white/40">
    <a href="./index.html" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl no-underline">&times;</a>

    <!-- LOGIN FORM -->
    <div id="loginSection">
      <h2 class="text-2xl font-bold mb-6 text-center text-gray-800 tracking-tight">Login</h2>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-gray-600 text-sm font-medium">Email</label>
          <input type="email" id="email" required class="w-full mt-1 p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
        </div>
        <div>
          <label class="block text-gray-600 text-sm font-medium">Password</label>
          <input type="password" id="password" required class="w-full mt-1 p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
        </div>
        <div class="text-right">
          <!-- Toggle to Forgot Password view -->
          <button type="button" id="showForgotBtn" class="text-sm text-blue-500 hover:underline">Forgot Password?</button>
        </div>
        <button type="submit" class="w-full bg-[#2A2A24] text-white py-2.5 rounded-xl font-semibold hover:bg-orange-600 transition shadow-sm">Login</button>
      </form>
    </div>

    <!-- FORGOT PASSWORD FORM (Hidden by Default) -->
    <div id="forgotSection" class="hidden">
      <h2 class="text-2xl font-bold mb-2 text-center text-gray-800 tracking-tight">Forgot Password</h2>
      <p class="text-xs text-gray-500 text-center mb-6">Apna register email dalein, hum aapko password reset link bhejenge.</p>
      <form id="forgotForm" class="space-y-4">
        <div>
          <label class="block text-gray-600 text-sm font-medium">Email Address</label>
          <input type="email" id="forgotEmail" required class="w-full mt-1 p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
        </div>
        <button type="submit" class="w-full bg-[#2A2A24] text-white py-2.5 rounded-xl font-semibold hover:bg-orange-600 transition shadow-sm">Send Reset Link</button>
        <div class="text-center mt-4">
          <button type="button" id="backToLoginBtn" class="text-sm text-gray-600 hover:underline">Back to Login</button>
        </div>
      </form>
    </div>

    <p class="mt-6 text-center text-sm text-gray-600">
      Don't have an account? <a href="register.html" class="text-blue-500 font-semibold hover:underline">Register</a>
    </p>
  </div>

  <!-- FIX: app.js ko yahan se hata diya hai taaki koi state conflict na ho -->
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
