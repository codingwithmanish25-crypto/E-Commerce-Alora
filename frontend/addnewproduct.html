<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Product</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="font-['Manrope'] bg-gray-50 flex flex-col h-screen">

    <nav class="h-16 bg-gray-900 text-white flex items-center px-6 shrink-0">
        <h1 class="text-xl font-bold">Hello Admin</h1>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="bg-gray-800 text-gray-300 w-64 min-h-full p-4 flex flex-col justify-between shrink-0">
            <nav class="w-full">
                <ul class="space-y-2">
                    <li>
                        <a href="./dashboard.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-gray-700 transition">
                            <i class="fa-solid fa-chart-line"></i> Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="./adminproduct.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-gray-700 text-white font-medium">
                            <i class="fa-solid fa-box"></i> Product
                        </a>
                    </li>
                    <li>
                        <a href="./navbar.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-gray-700 transition">
                            <i class="fa-solid fa-compass"></i> Navigation
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto max-w-3xl mx-auto w-full">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 animate__animated animate__fadeIn">
                <h2 class="text-lg font-bold text-gray-800 mb-4">Add New Product (With Multi-Variants)</h2>
                
                <form id="productForm" class="space-y-5" enctype="multipart/form-data">
                    
                    <div class="grid grid-cols-3 gap-4">
                        <div class="col-span-2">
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Product Name</label>
                            <input type="text" name="name" placeholder="e.g., Glow Ritual | Daily Radiance Cream" 
                                   class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-600/20 focus:border-amber-700 text-sm" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Batch Number</label>
                            <input type="text" name="batchNumber" value="BATCH-GR-014" placeholder="BATCH-GR-014" 
                                   class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-600/20 focus:border-amber-700 text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Product Description</label>
                        <textarea name="description" rows="3" placeholder="Write product benefits, ingredients details..." 
                                  class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-600/20 focus:border-amber-700 text-sm" required></textarea>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Initial Rating</label>
                            <input type="number" name="rating" step="0.1" min="0" max="5" value="4.5" 
                                   class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-600/20 focus:border-amber-700 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Total Reviews</label>
                            <input type="number" name="totalReviews" min="0" value="0" 
                                   class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-600/20 focus:border-amber-700 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Status</label>
                            <select name="isAvailable" class="w-full px-3 py-2 border border-gray-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-amber-600/20 focus:border-amber-700 text-sm">
                                <option value="true" selected>Available</option>
                                <option value="false">Hidden / Out of Stock</option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-gray-50/50 p-4 border border-gray-200/60 rounded-2xl space-y-3">
                        <div class="flex items-center justify-between border-b border-gray-200 pb-2">
                            <h3 class="text-xs font-bold uppercase tracking-wider text-gray-700">Product Volumes & Pricing Variants</h3>
                            <button type="button" onclick="addVariantRow()" class="text-xs font-bold text-amber-700 hover:text-amber-800 flex items-center gap-1 bg-amber-50 px-2.5 py-1 rounded-lg border border-amber-200 transition">
                                <i class="fa-solid fa-plus text-[10px]"></i> Add Variant
                            </button>
                        </div>

                        <div id="variantsContainer" class="space-y-3">
                            <div class="variant-row grid grid-cols-4 gap-3 items-end bg-white p-3 rounded-xl border border-gray-100 shadow-sm relative">
                                <div>
                                    <label class="block text-[11px] font-medium text-gray-400 uppercase tracking-wider mb-1">Volume</label>
                                    <select class="v-volume w-full px-2 py-1.5 border border-gray-200 rounded-lg bg-white text-xs focus:outline-none focus:border-amber-700">
                                        <option value="30ml">30ml</option>
                                        <option value="50ml">50ml</option>
                                        <option value="100ml" selected>100ml</option>
                                        <option value="200ml">200ml</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[11px] font-medium text-gray-400 uppercase tracking-wider mb-1">Offer Price (₹)</label>
                                    <input type="number" min="0" placeholder="e.g. 300" class="v-price w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-amber-700" required>
                                </div>
                                <div>
                                    <label class="block text-[11px] font-medium text-gray-400 uppercase tracking-wider mb-1">MRP Price (₹)</label>
                                    <input type="number" min="0" placeholder="e.g. 450" class="v-comparePrice w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-amber-700">
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-full">
                                        <label class="block text-[11px] font-medium text-gray-400 uppercase tracking-wider mb-1">Stock</label>
                                        <input type="number" min="0" value="10" class="v-stock w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-amber-700" required>
                                    </div>
                                    <button type="button" onclick="removeVariantRow(this)" class="text-red-400 hover:text-red-600 mt-5 p-1 transition opacity-0 pointer-events-none">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Upload Main Product Image</label>
                        <input type="file" name="imagepath" accept="image/*"
                               class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-600/20 focus:border-amber-700 text-sm" required>
                    </div>

                    <div class="pt-2">
                        <button type="submit" 
                                class="w-full bg-[#a35242] hover:bg-[#8c4335] text-white font-medium py-2.5 px-4 rounded-xl shadow-sm transition duration-200 text-sm uppercase tracking-wider">
                            Save Product With Variants
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // Function to dynamically add a new Variant row (e.g., adding 200ml after 100ml)
        function addVariantRow() {
            const container = document.getElementById("variantsContainer");
            const newRow = document.createElement("div");
            newRow.className = "variant-row grid grid-cols-4 gap-3 items-end bg-white p-3 rounded-xl border border-gray-100 shadow-sm relative animate__animated animate__fadeInUp animate__faster";
            
            newRow.innerHTML = `
                <div>
                    <select class="v-volume w-full px-2 py-1.5 border border-gray-200 rounded-lg bg-white text-xs focus:outline-none focus:border-amber-700">
                        <option value="30ml">30ml</option>
                        <option value="50ml">50ml</option>
                        <option value="100ml">100ml</option>
                        <option value="200ml" selected>200ml</option>
                    </select>
                </div>
                <div>
                    <input type="number" min="0" placeholder="e.g. 500" class="v-price w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-amber-700" required>
                </div>
                <div>
                    <input type="number" min="0" placeholder="e.g. 700" class="v-comparePrice w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-amber-700">
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-full">
                        <input type="number" min="0" value="10" class="v-stock w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-amber-700" required>
                    </div>
                    <button type="button" onclick="removeVariantRow(this)" class="text-red-400 hover:text-red-600 mt-1.5 p-1 transition">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `;
            container.appendChild(newRow);
        }

        // Function to delete an added variant row
        function removeVariantRow(button) {
            const row = button.closest('.variant-row');
            row.remove();
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const formData = new FormData(e.target);

            // --- Variants Object Compiler Process ---
            const variantRows = document.querySelectorAll('.variant-row');
            const variantsArray = [];

            variantRows.forEach(row => {
                const volume = row.querySelector('.v-volume').value;
                const price = row.querySelector('.v-price').value;
                const comparePrice = row.querySelector('.v-comparePrice').value;
                const stock = row.querySelector('.v-stock').value;

                if (volume && price) {
                    variantsArray.push({
                        volume: volume,
                        price: Number(price),
                        comparePrice: comparePrice ? Number(comparePrice) : undefined,
                        stock: stock ? Number(stock) : 10
                    });
                }
            });

            // Variants array ko JSON string format me convert karke send karenge
            formData.append('variants', JSON.stringify(variantsArray));

            try {
                const response = await fetch('http://localhost:5000/api/product/add', {
                    method: 'POST',
                    body: formData 
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Product with multiple variants successfully added!');
                    // Form aur variants rows ko reset karein
                    e.target.reset();
                    document.getElementById("variantsContainer").innerHTML = `
                        <div class="variant-row grid grid-cols-4 gap-3 items-end bg-white p-3 rounded-xl border border-gray-100 shadow-sm relative">
                            <div>
                                <select class="v-volume w-full px-2 py-1.5 border border-gray-200 rounded-lg bg-white text-xs">
                                    <option value="30ml">30ml</option>
                                    <option value="50ml">50ml</option>
                                    <option value="100ml" selected>100ml</option>
                                    <option value="200ml">200ml</option>
                                </select>
                            </div>
                            <div>
                                <input type="number" min="0" placeholder="e.g. 300" class="v-price w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs" required>
                            </div>
                            <div>
                                <input type="number" min="0" placeholder="e.g. 450" class="v-comparePrice w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs">
                            </div>
                            <div class="flex items-center gap-2">
                                <div class="w-full">
                                    <input type="number" min="0" value="10" class="v-stock w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs" required>
                                </div>
                                <button type="button" onclick="removeVariantRow(this)" class="text-red-400 hover:text-red-600 mt-5 p-1 opacity-0 pointer-events-none"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </div>`;
                } else {
                    alert('Error: ' + (data.error || 'Product add nahi ho paya'));
                }
            } catch (err) {
                console.error('Submission error:', err);
                alert('Server se connect nahi ho paya!');
            }
        });
    </script>
</body>
</html>
