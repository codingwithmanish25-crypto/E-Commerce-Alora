<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alora Radiance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    ink: '#152219',
                    'ink-light': '#1F3327',
                    'ink-soft': '#28402F',
                    parchment: '#F7F2E7',
                    card: '#FFFFFF',
                    clay: '#A24C3D',
                    'clay-light': '#C97E63',
                    'clay-dark': '#7E3A2F',
                    sage: '#6C8763',
                    'sage-light': '#E7ECDF',
                    gold: '#BB9556',
                    ash: '#6B685F',
                },
                fontFamily: {
                   
                    robot: ['"PT Sans"', 'ui-robot', 'Georgia', 'robot'],
                    sans: ['"PT Sans"', 'Manrope', 'sans-serif'],
                    roboto: ['"Roboto Mono"', 'monospace'],
                },
            }
        }
    }
</script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-parchment text-[#2A2A24] font-sans antialiased">

    <!-- ============ NAV (matches index.html) ============ -->
 <div id="navbar-placeholder"></div>

    <!-- ============ SUB-BAR: quick filters + page title ============ -->
    <div class="bg-white border-b border-[#ECE4CE]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
            <div>
                <p class="text-[10px] font-bold tracking-[0.25em] uppercase text-clay">The Collection</p>
                <h1 class="text-sm font-serif  font-semibold text-ink -mt-0.5">Shop All Products</h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="applyQuickFilter('all')" class="text-xs font-semibold uppercase tracking-wide text-ash hover:text-ink px-3 py-1.5 rounded-full border border-transparent hover:border-[#E3D9BC] transition">View All</button>
                <button onclick="applyQuickFilter('bestseller')" class="text-xs font-semibold uppercase tracking-wide text-ash hover:text-clay px-3 py-1.5 rounded-full border border-transparent hover:border-clay/30 transition"><i class="fa-solid fa-fire text-clay mr-1"></i>Bestsellers</button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex flex-col lg:flex-row gap-8">

            <aside class="w-full lg:w-64 flex-shrink-0 bg-white p-6 rounded-2xl border border-[#ECE4CE] shadow-sm h-fit">
                <div class="flex items-center justify-between mb-6 border-b border-dashed border-[#E3D9BC] pb-4">
                    <h2 class="font-serif font-semibold text-ink tracking-wide text-base"><i class="fa-solid fa-sliders mr-2 text-clay text-sm"></i>Filters</h2>
                    <button onclick="resetFilters()" class="text-xs text-clay hover:text-clay-dark hover:underline font-semibold">Clear All</button>
                </div>

                <div class="mb-6">
                    <label class="block text-xs font-bold text-ash uppercase tracking-wider mb-2">Sort By</label>
                    <select id="sort-filter" onchange="filterProducts()" class="w-full bg-parchment border border-[#DCD3BA] rounded-lg p-2.5 text-sm text-ink focus:outline-none focus:border-clay">
                        <option value="featured">Featured</option>
                        <option value="price-low-high">Price: Low to High</option>
                        <option value="price-high-low">Price: High to Low</option>
                        <option value="rating-high-low">Top Rated</option>
                    </select>
                </div>

<!-- ============ UPDATE CHECKBOXES IN YOUR HTML ============ -->
<div class="mb-6">
    <label class="block text-xs font-bold text-ash uppercase tracking-wider mb-2">Collection</label>
    <div class="space-y-2.5">
        <!-- <label class="flex items-center text-sm text-[#3d3b34] cursor-pointer hover:text-ink">
            <input type="checkbox" name="category" value="skin" onchange="filterProducts()" class="rounded border-[#DCD3BA] text-clay focus:ring-clay mr-2.5"> Skin
        </label> -->
        <label class="flex items-center text-sm text-[#3d3b34] cursor-pointer hover:text-ink">
            <input type="checkbox" name="category" value="face" onchange="filterProducts()" class="rounded border-[#DCD3BA] text-clay focus:ring-clay mr-2.5"> Face
        </label>
        <label class="flex items-center text-sm text-[#3d3b34] cursor-pointer hover:text-ink">
            <input type="checkbox" name="category" value="cream" onchange="filterProducts()" class="rounded border-[#DCD3BA] text-clay focus:ring-clay mr-2.5"> Cream
        </label>
        <label class="flex items-center text-sm text-[#3d3b34] cursor-pointer hover:text-ink">
            <input type="checkbox" name="category" value="body" onchange="filterProducts()" class="rounded border-[#DCD3BA] text-clay focus:ring-clay mr-2.5"> Body
        </label>
    </div>
</div>

                <div class="mb-6">
                    <label class="block text-xs font-bold text-ash uppercase tracking-wider mb-2">Max Price</label>
                    <input type="range" id="price-range" min="200" max="1500" value="1500" oninput="updatePriceLabel(this.value)" onchange="filterProducts()" class="w-full h-1 bg-[#E3D9BC] rounded-lg appearance-none cursor-pointer accent-clay">
                    <div class="flex justify-between text-xs text-ash mt-2">
                        <span>₹200</span>
                        <span id="price-max-label" class="font-semibold text-clay">₹1500</span>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-ash uppercase tracking-wider mb-2">Customer Review</label>
                    <div class="space-y-1.5">
                        <button onclick="setRatingFilter(4)" class="rating-filter-btn flex items-center text-sm text-[#3d3b34] hover:text-clay w-full text-left py-1">
                            <span class="text-gold mr-2 text-xs"><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-regular fa-star text-[#D9D2BC]"></i></span> &amp; Up
                        </button>
                        <button onclick="setRatingFilter(3)" class="rating-filter-btn flex items-center text-sm text-[#3d3b34] hover:text-clay w-full text-left py-1">
                            <span class="text-gold mr-2 text-xs"><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-regular fa-star text-[#D9D2BC]"></i><i class="fa-regular fa-star text-[#D9D2BC]"></i></span> &amp; Up
                        </button>
                    </div>
                </div>
            </aside>

            <section class="flex-1">
                <div class="flex items-center justify-between mb-6 bg-white border border-[#ECE4CE] p-4 rounded-2xl shadow-sm">
                    <span id="results-count" class="text-sm font-medium text-ash">Showing all products</span>
                    <div class="flex gap-2 text-xs">
                        <span id="badge-bestseller" class="hidden bg-clay/10 text-clay-dark font-semibold px-3 py-1.5 rounded-full"><i class="fa-solid fa-fire mr-1"></i>Bestseller Filter Active</span>
                    </div>
                </div>

                <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    </div>

                <div id="no-products" class="hidden text-center py-20 bg-white border border-[#ECE4CE] rounded-2xl mt-4">
                    <i class="fa-solid fa-magnifying-glass text-4xl text-[#D9D2BC] mb-3"></i>
                    <p class="text-ash font-medium">No items matched your dynamic filter selection.</p>
                </div>
            </section>

        </div>

     
    </main>

    <!-- ============ FOOTER (matches index.html) ============ -->

    <div id="footer-placeholder"></div>
 <!-- ============Popup Form to New Lead============ -->
   <div id="lead-modal-container"></div>


        <script src="./js/include.js"></script>

   <script src="./js/moreproduct.js"></script>
   <script type="module" src="./js/moreproduct.js"></script>


   <script src="./js/app.js"></script>
   <script type="module" src="./js/contacts.js"></script>

   <script type="module" src="./js/lead.js"></script>
    <script>
        // Modal ko background me dynamically pull karne ke liye script
        fetch('./lead.html')
            .then(response => response.text())
            .then(htmlContent => {
                document.getElementById('lead-modal-container').innerHTML = htmlContent;
            })
            .catch
        </script>
</body>
</html>
