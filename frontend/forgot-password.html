<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-4 text-center text-gray-800">Forgot Password</h2>
    <p class="text-sm text-gray-500 mb-6 text-center">Enter your email and we'll send you a password recovery link.</p>
    <form id="forgotForm" class="space-y-4">
      <div>
        <label class="block text-gray-600 text-sm font-medium">Email Address</label>
        <input type="email" id="email" required class="w-full mt-1 p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
      </div>
      <button type="submit" class="w-full bg-purple-500 text-white p-2 rounded hover:bg-purple-600 transition">Send Reset Link</button>
    </form>
  </div>
<script type="module" src="./js/app.js"></script>
</body>
</html>
