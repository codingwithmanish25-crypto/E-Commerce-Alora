<div id="leadModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl relative border border-[#ECE4CE] animate__animated animate__fadeIn">
        <button onclick="closeLeadModal()" class="absolute top-4 right-4 text-ash hover:text-black text-xl">&times;</button>
        
        <h3 class="text-xl font-serif font-bold text-[#A0522D] mb-2 text-center">Please Fill This Form First</h3>
        <p class="text-xs text-ash text-center mb-6">Delivery aur instant order updates ke liye details fill karein.</p>
        
        <form id="leadForm" onsubmit="handleLeadSubmit(event)">
            <div class="mb-4">
                <label class="block text-xs font-semibold text-ash uppercase tracking-wider mb-1">Full Name</label>
                <input type="text" id="leadName" required class="w-full px-4 py-2.5 border border-[#DCD3BA] rounded-lg focus:outline-none focus:border-[#A0522D] text-sm" placeholder="Enter your name">
            </div>

            <div class="mb-4">
                <label class="block text-xs font-semibold text-ash uppercase tracking-wider mb-1">Email Address</label>
                <input type="email" id="leadEmail" required class="w-full px-4 py-2.5 border border-[#DCD3BA] rounded-lg focus:outline-none focus:border-[#A0522D] text-sm" placeholder="Enter your email">
            </div>
            
            <div class="mb-4">
                <label class="block text-xs font-semibold text-ash uppercase tracking-wider mb-1">Phone Number</label>
                <input 
                    type="tel" 
                    id="leadPhone" 
                    required 
                    pattern="[6-9][0-9]{9}"
                    maxlength="10"
                    title="Kripya 10-digit ka valid Indian phone number dalein (Jo 6, 7, 8, ya 9 se shuru hota ho)"
                    class="w-full px-4 py-2.5 border border-[#DCD3BA] rounded-lg focus:outline-none focus:border-[#A0522D] text-sm" 
                    placeholder="Enter 10-digit mobile number"
                >
            </div>
            
            <div class="mb-6">
                <label class="block text-xs font-semibold text-ash uppercase tracking-wider mb-1">Delivery Address</label>
                <textarea id="leadAddress" required rows="3" class="w-full px-4 py-2.5 border border-[#DCD3BA] rounded-lg focus:outline-none focus:border-[#A0522D] text-sm" placeholder="Enter full address"></textarea>
            </div>
            
            <button type="submit" class="w-full bg-[#A0522D] hover:bg-[#8B4513] text-white py-3 rounded-lg font-semibold text-xs tracking-widest uppercase transition">
                Submit & Continue
            </button>
        </form>
    </div>
</div>
